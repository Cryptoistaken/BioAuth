<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<meta name="theme-color" content="#0f172a" />
		<title>BioKey — Test App</title>
		<link rel="stylesheet" href="/src/style.css" />
	</head>
	<body>
		<header>
			<div class="logo">
				<div class="logo-icon">
					<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
						<path d="M12 2a4 4 0 0 1 4 4c0 1.5-.5 2.8-1.3 3.8"/>
						<path d="M8 6a4 4 0 0 0-.7 2.2C7.1 10.5 8 13 8 16"/>
						<path d="M12 2C9.8 2 8 3.8 8 6c0 2 .8 3.8 2 5"/>
						<path d="M16 10c.7 1 1 2.2 1 3.5 0 3-1.3 5.5-3 7"/>
						<path d="M12 22c-1.7-1.5-3-4-3-7 0-1.3.3-2.5.8-3.5"/>
						<circle cx="12" cy="12" r="1"/>
					</svg>
				</div>
				<span class="logo-text">Bio<span>Key</span></span>
			</div>
			<p class="tagline">Your fingerprint. Your identity. No middleman.</p>
		</header>

		<div class="card">
			<div class="card-header">
				<span class="card-title">Phase 0 — Test Surface</span>
				<span class="state" id="state">Not Enrolled</span>
			</div>

			<div class="fingerprint-graphic">
				<svg viewBox="0 0 100 100" fill="none" stroke="#f97316" stroke-width="2" stroke-linecap="round">
					<path d="M50 10 C30 10 15 25 15 45 C15 65 25 80 35 88"/>
					<path d="M50 18 C34 18 22 30 22 45 C22 60 30 74 40 82"/>
					<path d="M50 26 C38 26 29 35 29 45 C29 55 35 67 44 76"/>
					<path d="M50 34 C42 34 36 39 36 45 C36 51 40 60 48 69"/>
					<path d="M50 42 C46 42 43 43.5 43 45 C43 47 44.5 53 52 62"/>
					<path d="M65 88 C72 80 82 65 82 45 C82 25 68 10 50 10"/>
					<path d="M60 82 C66 74 72 60 72 45 C72 30 62 18 50 18"/>
					<path d="M56 76 C60 67 65 55 65 45 C65 35 58 26 50 26"/>
					<path d="M52 69 C54 60 58 51 58 45 C58 39 54 34 50 34"/>
					<path d="M52 62 C53 56 55 50 55 45 C55 42.5 53 42 50 42"/>
				</svg>
			</div>

			<div id="status" class="status"></div>

			<div class="actions">
				<button id="enroll-btn" class="btn-primary">Enroll Fingerprint</button>
				<button id="auth-btn" class="btn-secondary" disabled>Authenticate</button>
				<button id="reset-btn" class="btn-ghost">Reset enrollment</button>
			</div>

			<div id="key-display" class="key-display">
				<div class="key-label">Identity Key (public)</div>
				<div id="key-value" class="key-value"></div>
			</div>
		</div>

		<p class="note">
			Requires HTTPS or localhost.<br />
			No biometric data leaves your device.
		</p>

		<script type="module" src="/src/main.js"></script>
	</body>
</html>
